    function fetchMap(success, fail) {
      $.ajax({
        url: './data/jiangyings.json',
        success: function(res){
          echarts.registerMap('江阴', res)

          success && success(res)
        },
        error: function() {
          fail && fail()
        }
      })
    }

    function initChart(index) {
      var dom = document.getElementById(`chart${index}`)

      if (!dom) return

      var chart = echarts.init(dom)

      return chart
    }

    function openFullScreen() {
      var de = document.documentElement;
      if (de.requestFullscreen) {
        de.requestFullscreen()
      } else if (de.msRequestFullscreen) {
        de.msRequestFullscreen()
      } else if (de.webkitRequestFullScreen) {
        de.webkitRequestFullScreen()
      } else if (de.mozRequestFullScreen) {
        de.mozRequestFullScreen()
      }
    }
    function exitFullscreen() {
      var de = document;
      if(de.exitFullscreen) {
        de.exitFullscreen()
      } else if(de.msExitFullscreen) {
        de.msExitFullscreen()
      } else if(de.mozCancelFullScreen) {
        de.mozCancelFullScreen()
      } else if(de.webkitExitFullscreen) {
        de.webkitExitFullscreen()
      }
    }

    function appendZero(value) {
      return (value + '').length < 2 ? '0' + value : value
    }
    function getDate() {
      var date = new Date()
      var y = date.getFullYear()
      var mon = date.getMonth() + 1
      var d = date.getDate()
      var h = date.getHours()
      var m = date.getMinutes()
      var s = date.getSeconds()
      var day = date.getDay()
      var weeks = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六']

      $('#dateT').html(appendZero(h) + ':' + appendZero(m) + ':' + appendZero(s))
      $('#dateD').html(y + '年' + mon + '月' + d + '日 ' + weeks[day])
    }

    window.onload = function() {

        $('#exitFullScreen').show()
      })
      $('#exitFullScreen').click(function () {

      // 实时显示当前时间
